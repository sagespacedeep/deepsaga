version: '3.8'

###############################################################################
# Deep Space - Production Docker Compose Configuration
#
# Services: PostgreSQL 15, Redis 7
#
# Usage:
#   docker-compose -f deploy/docker-compose.production.yml up -d
#   docker-compose -f deploy/docker-compose.production.yml down
#   docker-compose -f deploy/docker-compose.production.yml logs -f
###############################################################################

services:
  #############################################################################
  # PostgreSQL Database
  #############################################################################
  postgres:
    image: postgres:15-alpine
    container_name: deepspace-postgres-prod
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deepspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      POSTGRES_DB: ${POSTGRES_DB:-deepspace}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      # Timezone
      TZ: UTC

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      # Persistent data storage
      - postgres_data:/var/lib/postgresql/data
      # Custom PostgreSQL configuration (optional)
      # - ./postgres.conf:/etc/postgresql/postgresql.conf

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deepspace} -d ${POSTGRES_DB:-deepspace}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - deepspace-network

    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Backup considerations
    labels:
      - "com.deepspace.service=database"
      - "com.deepspace.environment=production"

  #############################################################################
  # Redis Cache
  #############################################################################
  redis:
    image: redis:7-alpine
    container_name: deepspace-redis-prod
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000

    environment:
      TZ: UTC

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      # Persistent data storage for AOF and RDB
      - redis_data:/data
      # Optional custom Redis configuration
      # - ./redis.conf:/usr/local/etc/redis/redis.conf

    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    networks:
      - deepspace-network

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.deepspace.service=cache"
      - "com.deepspace.environment=production"

###############################################################################
# Networks
###############################################################################
networks:
  deepspace-network:
    driver: bridge
    name: deepspace-network
    labels:
      - "com.deepspace.network=main"

###############################################################################
# Volumes
###############################################################################
volumes:
  postgres_data:
    driver: local
    name: deepspace-postgres-data
    labels:
      - "com.deepspace.volume=postgres"
      - "com.deepspace.backup=daily"

  redis_data:
    driver: local
    name: deepspace-redis-data
    labels:
      - "com.deepspace.volume=redis"
      - "com.deepspace.backup=daily"

###############################################################################
# Notes:
#
# 1. Environment Variables:
#    Set these in a .env file in the same directory:
#      - POSTGRES_USER
#      - POSTGRES_PASSWORD (MUST change in production!)
#      - POSTGRES_DB
#      - POSTGRES_PORT
#      - REDIS_PASSWORD (MUST change in production!)
#      - REDIS_PORT
#
# 2. Data Persistence:
#    All data is stored in named volumes:
#      - deepspace-postgres-data
#      - deepspace-redis-data
#
# 3. Backup Strategy:
#    - PostgreSQL: Use pg_dump or volume snapshots
#    - Redis: AOF and RDB files in redis_data volume
#
# 4. Security:
#    - Change default passwords before production!
#    - Consider using Docker secrets for sensitive data
#    - Restrict network access via firewall rules
#
# 5. Monitoring:
#    - Use `docker stats` for resource monitoring
#    - Check logs with: docker-compose logs -f [service]
#
# 6. Auto-start on boot:
#    - restart: unless-stopped ensures containers start with Docker daemon
#    - Enable Docker to start on boot: systemctl enable docker
###############################################################################
